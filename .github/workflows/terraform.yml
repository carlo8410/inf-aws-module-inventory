name: "Terraform CI/CD"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "us-east-2"
      FUNCTION_NAME: "mc-register-product-lambda"
      ALIAS_NAME: "fixed"
    outputs:
      new_version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve

      - name: Get Latest Published Version
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        id: get_version
        run: |
          VERSION=$(aws lambda list-versions-by-function --function-name ${{ env.FUNCTION_NAME }} --query 'Versions[-1].Version' --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Nueva versión detectada: $VERSION"

      - name: Deploy Canary (10%)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          NEW_VERSION=${{ steps.get_version.outputs.version }}
          # Mantenemos la versión base actual y añadimos el 10% a la nueva
          aws lambda update-alias \
            --function-name ${{ env.FUNCTION_NAME }} \
            --name ${{ env.ALIAS_NAME }} \
            --routing-config "{\"AdditionalVersionWeights\":{\"$NEW_VERSION\":0.1}}"

  promote:
    name: "Promote to Production"
    needs: terraform
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: "us-east-2"
      FUNCTION_NAME: "mc-register-product-lambda"
      ALIAS_NAME: "fixed"

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Full Traffic Shift (100%)
        run: |
          NEW_VERSION=${{ needs.terraform.outputs.new_version }}
          # Pasamos la versión base a la nueva y limpiamos los pesos adicionales
          aws lambda update-alias \
            --function-name ${{ env.FUNCTION_NAME }} \
            --name ${{ env.ALIAS_NAME }} \
            --function-version $NEW_VERSION \
            --routing-config "{\"AdditionalVersionWeights\":{}}"
